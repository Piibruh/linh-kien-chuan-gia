<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg-grad)" />

  <!-- Outer Ring (Circuit Path) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#primary-grad)" stroke-width="12" stroke-dasharray="180 40 80 40" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Circuit Nodes -->
  <circle cx="96" cy="256" r="14" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="416" cy="256" r="14" fill="#3B82F6" filter="url(#glow)"/>
  <circle cx="256" cy="96" r="14" fill="#3B82F6" />
  <circle cx="256" cy="416" r="14" fill="#06B6D4" />

  <!-- Center Hexagon (Microchip/Core) -->
  <polygon points="256,160 336,208 336,304 256,352 176,304 176,208" fill="url(#accent-grad)" fill-opacity="0.1" stroke="url(#accent-grad)" stroke-width="16" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Inner Checkmark (Chuẩn / Quality) -->
  <path d="M220 260 L245 285 L300 215" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Inner connections / pins -->
  <line x1="256" y1="160" x2="256" y2="120" stroke="url(#accent-grad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="352" x2="256" y2="392" stroke="url(#accent-grad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="336" y1="208" x2="370" y2="188" stroke="url(#accent-grad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="176" y1="304" x2="142" y2="324" stroke="url(#accent-grad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="336" y1="304" x2="370" y2="324" stroke="url(#accent-grad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="176" y1="208" x2="142" y2="188" stroke="url(#accent-grad)" stroke-width="12" stroke-linecap="round"/>
</svg>
